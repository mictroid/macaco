name: Release to Play Store

# Manual trigger only — releases are deliberate, not on every push.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.jks"

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/release.jks
          storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Write local.properties
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > local.properties

      # No play-service-account.json is checked out (it's git-ignored and never committed), so
      # gradle-play-publisher uses Application Default Credentials instead — this step exchanges
      # the job's OIDC token for the bare federated identity via Workload Identity Federation (no
      # long-lived key, trust scoped to this exact repo; see docs/release-setup.md). Deliberately
      # NOT impersonating play-publisher here: GPP does that hop itself (impersonateServiceAccount
      # in app/build.gradle.kts), which is what correctly requests the androidpublisher scope —
      # impersonating at both layers double-hops and the resulting token gets rejected.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/502845055894/locations/global/workloadIdentityPools/github-pool/providers/github-provider

      - name: Build and publish to Play internal testing
        run: |
          chmod +x gradlew
          ./gradlew publishReleaseBundle
