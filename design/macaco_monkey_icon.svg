<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" shape-rendering="geometricPrecision">
  <defs>

    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>

    <!-- Ocean deep teal background, radial vignette -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1A6478"/>
      <stop offset="55%"  stop-color="#0A4A58"/>
      <stop offset="100%" stop-color="#052A35"/>
    </radialGradient>

    <!-- Gold outlines -->
    <linearGradient id="lineGrad" gradientUnits="userSpaceOnUse" x1="512" y1="780" x2="512" y2="270">
      <stop offset="0%"   stop-color="#C8920A"/>
      <stop offset="40%"  stop-color="#E8B020"/>
      <stop offset="100%" stop-color="#F5D040"/>
    </linearGradient>

    <!-- Soft glow pass -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" clip-path="url(#iconClip)"/>
  <ellipse cx="512" cy="430" rx="420" ry="290" fill="#2A7890" opacity="0.18" clip-path="url(#iconClip)"/>

  <!-- ═══ FACE — scaled 1.15× from centre (512, 512) ════════════
       All coordinates below are original × 1.15 + offset.
       Head centre: (512, 504)  r=242
       L ear:       (280, 487)  r=94      R ear: (744, 487)  r=94
       L lens:      (418, 484)  r=83      R lens:(606, 484)  r=83
       Muzzle:      (512, 613)  rx=92 ry=63
  ════════════════════════════════════════════════════════════════ -->

  <!-- Muzzle (behind glasses) -->
  <ellipse cx="512" cy="613" rx="92" ry="63"
           fill="none" stroke="url(#lineGrad)" stroke-width="23"
           clip-path="url(#iconClip)" filter="url(#glow)"/>

  <!-- Head -->
  <circle cx="512" cy="504" r="242"
          fill="none" stroke="url(#lineGrad)" stroke-width="25"
          clip-path="url(#iconClip)" filter="url(#glow)"/>

  <!-- Ears -->
  <circle cx="280" cy="487" r="94" fill="none" stroke="url(#lineGrad)" stroke-width="23" clip-path="url(#iconClip)" filter="url(#glow)"/>
  <circle cx="744" cy="487" r="94" fill="none" stroke="url(#lineGrad)" stroke-width="23" clip-path="url(#iconClip)" filter="url(#glow)"/>
  <!-- Inner ear bowls -->
  <ellipse cx="280" cy="487" rx="56" ry="59" fill="none" stroke="url(#lineGrad)" stroke-width="15" clip-path="url(#iconClip)"/>
  <ellipse cx="744" cy="487" rx="56" ry="59" fill="none" stroke="url(#lineGrad)" stroke-width="15" clip-path="url(#iconClip)"/>

  <!-- Sunglasses — dark filled lenses -->
  <circle cx="418" cy="484" r="83" fill="#040E14" stroke="url(#lineGrad)" stroke-width="21" clip-path="url(#iconClip)" filter="url(#glow)"/>
  <circle cx="606" cy="484" r="83" fill="#040E14" stroke="url(#lineGrad)" stroke-width="21" clip-path="url(#iconClip)" filter="url(#glow)"/>
  <!-- Nose bridge -->
  <line x1="501" y1="484" x2="524" y2="484" stroke="url(#lineGrad)" stroke-width="15" stroke-linecap="round" clip-path="url(#iconClip)"/>
  <!-- Temple arms -->
  <line x1="335" y1="484" x2="283" y2="487" stroke="url(#lineGrad)" stroke-width="15" stroke-linecap="round" clip-path="url(#iconClip)"/>
  <line x1="689" y1="484" x2="741" y2="487" stroke="url(#lineGrad)" stroke-width="15" stroke-linecap="round" clip-path="url(#iconClip)"/>

  <!-- Eyebrows -->
  <path d="M 369 395 Q 418 372 466 395"
        fill="none" stroke="url(#lineGrad)" stroke-width="18" stroke-linecap="round"
        clip-path="url(#iconClip)" filter="url(#glow)"/>
  <path d="M 558 395 Q 606 372 655 395"
        fill="none" stroke="url(#lineGrad)" stroke-width="18" stroke-linecap="round"
        clip-path="url(#iconClip)" filter="url(#glow)"/>

  <!-- Nostrils -->
  <circle cx="488" cy="629" r="13" fill="#E8B020" clip-path="url(#iconClip)"/>
  <circle cx="536" cy="629" r="13" fill="#E8B020" clip-path="url(#iconClip)"/>

</svg>
